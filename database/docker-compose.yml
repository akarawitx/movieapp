services:
  db:
    image: postgres:16
    container_name: movieapp_db
    restart: always
    environment:
      POSTGRES_DB: movieapp
      POSTGRES_USER: movieuser
      POSTGRES_PASSWORD: moviepass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
